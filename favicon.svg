<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <defs>
        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FE7F2D" />
            <stop offset="100%" stop-color="#EAECF0" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Background rounded tile -->
    <rect width="32" height="32" rx="7" fill="#000000" />
    <rect x="1" y="1" width="30" height="30" rx="6" fill="#233D4D" stroke="rgba(234, 236, 240, 0.1)" stroke-width="1" />
    
    <!-- Shield Logo -->
    <path d="M16 7.5L23 10V15C23 19.5 16 22.5 16 22.5C16 22.5 9 19.5 9 15V10L16 7.5Z" fill="url(#shieldGrad)" filter="url(#glow)" />
    
    <!-- Internal key symbol on the shield -->
    <path d="M16 11.5V15" stroke="#233D4D" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="16" cy="17.5" r="0.9" fill="#233D4D"/>
</svg>
